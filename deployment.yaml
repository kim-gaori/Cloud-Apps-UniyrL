apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ko">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>서비스 상태</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          display: flex; justify-content: center; align-items: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
          font-family: "Malgun Gothic", Arial, sans-serif;
        }
        .card {
          background: #fff; border-radius: 20px;
          padding: 60px 100px; text-align: center;
          box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }
        .icon   { font-size: 4rem; margin-bottom: 20px; }
        .status { font-size: 2rem; color: #16a34a; font-weight: 700; margin-bottom: 16px; }
        .meta   { font-size: 0.85rem; color: #94a3b8; letter-spacing: .5px; margin-top: 6px; }
        .divider{ border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="icon">&#x2705;</div>
        <div class="status">서버의 상태가 정상입니다</div>
        <hr class="divider">
        <div class="meta">Service &nbsp;: service-a</div>
        <div class="meta">Version &nbsp;: 5.1.113</div>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: default
  annotations:
    app/create-datetime: "20260529090000"
    app/version: "5.1.113"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: service-a
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
