name: Deploy to EKS

on:
  push:
    tags:
      - 'Cloud-Apps-UniyrL-*'

jobs:
  # ────────────────────────────────────────────────
  # STEP 1 : 비프로덕션(staging) 배포 및 검증
  # ────────────────────────────────────────────────
  validate-staging:
    name: "Staging 배포 및 검증"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Update KubeConfig
      run: aws eks update-kubeconfig --name cloud-app-cluster --region ap-northeast-2

    - name: Create staging namespace
      run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to staging
      run: kubectl apply -f k8s/deployment.yaml -n staging

    - name: Staging rollout check
      run: |
        kubectl rollout restart deployment/service-a -n staging
        kubectl rollout status deployment/service-a -n staging --timeout=120s

    - name: Staging validation (health check)
      run: |
        kubectl wait --for=condition=available --timeout=60s deployment/service-a -n staging
        echo "Staging validation PASSED ✅"

  # ────────────────────────────────────────────────
  # STEP 2 : 프로덕션 배포 (staging 성공 후 진행)
  # ────────────────────────────────────────────────
  deploy-production:
    name: "Production 배포"
    needs: validate-staging
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Update KubeConfig
      run: aws eks update-kubeconfig --name cloud-app-cluster --region ap-northeast-2

    - name: Apply deployment manifest
      run: kubectl apply -f k8s/deployment.yaml

    - name: Record deployment metadata
      run: |
        kubectl annotate deployment service-a           app/deployed-by="${{ github.actor }}"           app/deployed-at="$(date -u +%Y%m%dT%H%M%SZ)"           app/git-tag="${{ github.ref_name }}"           app/status="deployed"           --overwrite

    - name: Production rollout
      run: |
        kubectl rollout restart deployment/service-a
        kubectl rollout status deployment/service-a --timeout=180s

    - name: Rollback on failure
      if: failure()
      run: |
        echo "⚠️  배포 실패 - 이전 버전으로 롤백합니다..."
        kubectl rollout undo deployment/service-a
        kubectl rollout status deployment/service-a --timeout=120s
        kubectl annotate deployment service-a           app/status="rolled-back"           app/rolled-back-at="$(date -u +%Y%m%dT%H%M%SZ)"           --overwrite
        echo "✅ 롤백 완료"
